version: "2"
run:
  modules-download-mode: vendor
linters:
  default: all
  disable:
    - cyclop
    - depguard # not used.
    - err113 # noisy.
    - exhaustruct
    - funlen # revive has same linter.
    - gochecknoglobals
    - gocognit # revive has same linter.
    - gocyclo # revive has same linter.
    - godox # not used.
    - intrange # useless linter.
    - lll # revive has same linter.
    - nonamedreturns # revive has same linter.
    - wrapcheck # noisy linter.
    - noinlineerr # useless.
    - wsl # deprecated.
  settings:
    gomodguard_v2:
      # Blocks 'replace' directives using local filesystem paths
      local-replace-directives: true
    exhaustive:
      # Program elements to check for exhaustiveness.
      check:
        - switch
        - map
      # Presence of "default" case in switch statements satisfies exhaustiveness,
      # even if all enum members are not listed.
      default-signifies-exhaustive: true
      # Enum members matching the supplied regex do not have to be listed in
      # switch statements to satisfy exhaustiveness.
      ignore-enum-members: ""
      # Enum types matching the supplied regex do not have to be listed in
      # switch statements to satisfy exhaustiveness.
      ignore-enum-types: ""
      # Consider enums only in package scopes, not in inner scopes.
      package-scope-only: true
      # Only run exhaustive check on switches with "//exhaustive:enforce" comment.
      explicit-exhaustive-switch: false
      # Only run exhaustive check on map literals with "//exhaustive:enforce" comment.
      explicit-exhaustive-map: false
      # Switch statement requires default case even if exhaustive.
      default-case-required: false
    dupword:
      # Keywords for detecting duplicate words.
      # If this list is not empty, only the words defined in this list will be detected.
      keywords: []
      # Keywords used to ignore detection.
      ignore: []
      # Checks only comments, skip strings.
      # Default: false
      comments-only: false
    ineffassign:
      # Check escaping variables of type error, may cause false positives.
      # Default: false
      check-escaping-errors: false
    unqueryvet:
      # Enable SQL builder checking.
      # Default: true
      check-sql-builders: true
      # Enable aliased wildcard detection like `SELECT t.*`.
      check-aliased-wildcard: true
      # Enable string concatenation analysis.
      check-string-concat: true
      # Enable format string analysis like `fmt.Sprintf`.
      check-format-strings: true
      # Enable strings.Builder analysis.
      check-string-builder: true
      # Enable subquery analysis.
      check-subqueries: true
       # Detects N+1 Query.
      check-n1: true
      # Detects SQL injection.
      check-sql-injection: false
      # Detects transaction leaks.
      check-tx-leaks: true
      # Regex patterns for acceptable SELECT * usage.
      # Default:
      # - "SELECT \\* FROM information_schema\\..*"
      # - "SELECT \\* FROM pg_catalog\\..*"
      # - "SELECT COUNT\\(\\*\\)"
      # - "SELECT MAX\\(\\*\\)"
      # - "SELECT MIN\\(\\*\\)"
      allowed-patterns:
        - "SELECT \\* FROM temp_.*"
        - "SELECT \\* FROM.*-- migration"
    iotamixing:
      # Whether to report individual consts rather than just the const block.
      # Default: false
      report-individual: false
    godoclint:
      # Default set of rules to enable.
      # Possible values are: `basic`, `all` or `none`.
      # Default: `basic` (enables `pkg-doc`, `single-pkg-doc`, `start-with-name`, and `deprecated`)
      default: basic
      # List of rules to enable in addition to the default set.
      enable:
        - max-len
        # Assert no unused link in godocs.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#no-unused-link
        - no-unused-link
        # Require proper doc links to standard library declarations where applicable.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#require-stdlib-doclink
        - require-stdlib-doclink
      disable:
        - start-with-name
        - pkg-doc
        - single-pkg-doc
      # A map for fine-tuning individual rules.
      # All subkeys are optional.
      options:
        max-len:
          # Maximum line length for godocs, not including the `// `, or `/*` or `*/` tokens.
          # Default: 77
          length: 99
    embeddedstructfieldcheck:
      # Checks that there is an empty space between the embedded fields and regular fields.
      # Default: true
      empty-line: true
      # Checks that sync.Mutex and sync.RWMutex are not used as embedded fields.
      forbid-mutex: true
    protogetter:
     # Skip files generated by specified generators from the checking.
      # Checks only the file's initial comment, which must follow the format: "// Code generated by <generator-name>".
      # Files generated by protoc-gen-go, protoc-gen-go-grpc, and protoc-gen-grpc-gateway are always excluded automatically.
      skip-generated-by: []
      # Skip files matching the specified glob pattern from the checking.
      skip-files: []
      # Skip any generated files from the checking.
      skip-any-generated: false
      # Skip first argument of append function.
      replace-first-arg-in-append: true
    funcorder:
      # Checks that constructors are placed after the structure declaration.
      constructor: true
      # Checks if the exported methods of a structure are placed before the non-exported ones.
      struct-method: true
      # Checks that exported functions are placed before unexported functions.
      function: true
       # Checks if the constructors and/or structure methods are sorted alphabetically.
      alphabetical: false
    errorlint:
      # Check whether fmt.Errorf uses the %w verb for formatting errors.
      # See the https://github.com/polyfloyd/go-errorlint for caveats.
      errorf: true
      # Permit more than 1 %w verb, valid per Go 1.20 (Requires errorf:true)
      errorf-multi: true
      # Check for plain type assertions and type switches.
      asserts: true
      # Check for plain error comparisons.
      comparison: true
    forbidigo:
      # Instead of matching the literal source code,
      # use type information to replace expressions with strings that contain the package name
      # and (for methods and fields) the type name.
      # This makes it possible to handle import renaming and forbid struct fields and methods.
      analyze-types: true
    gocritic:
      # Enable all checks.
      enable-all: true
      # Which checks should be disabled; can't be combined with 'enabled-checks'.
      disabled-checks:
        - sloppyReassign
        - whyNoLint
      # Settings passed to gocritic.
      # The settings key is the name of a supported gocritic checker.
      # The list of supported checkers can be find in https://go-critic.github.io/overview.
      settings:
        # Must be valid enabled check name.
        captLocal:
          # Whether to restrict checker to params only.
          paramsOnly: true
        commentedOutCode:
          # Min length of the comment that triggers a warning.
          minLength: 50
        elseif:
          # Whether to skip balanced if-else pairs.
          skipBalanced: true
        hugeParam:
          # Size in bytes that makes the warning trigger.
          sizeThreshold: 160
        ifElseChain:
          # Min number of if-else blocks that makes the warning trigger.
          minThreshold: 2
        nestingReduce:
          # Min number of statements inside a branch to trigger a warning.
          bodyWidth: 2
        rangeExprCopy:
          # Size in bytes that makes the warning trigger.
          sizeThreshold: 512
          # Whether to check test functions
          skipTestFuncs: true
        rangeValCopy:
          # Size in bytes that makes the warning trigger.
          sizeThreshold: 128
          # Whether to check test functions.
          skipTestFuncs: true
        tooManyResultsChecker:
          # Maximum number of results.
          maxResults: 3
        truncateCmp:
          # Whether to skip int/uint/uintptr types.
          skipArchDependent: true
        underef:
          # Whether to skip (*x).method() calls where x is a pointer receiver.
          skipRecvDeref: false
        unnamedResult:
          # Whether to check exported functions.
          checkExported: true
    godot:
      # Comments to be checked: `declarations`, `toplevel`, or `all`.
      scope: toplevel
      # List of regexps for excluding particular comment lines from check.
      exclude:
        # Exclude todo, fixme and note comments.
        - '^FIX:'
        - '^TODO:'
        - '^NOTE:'
      # Check that each sentence starts with a capital letter.
      capital: true
      # Check that each sentence ends with a period.
      period: true
    gosec:
      # To specify a set of rules to explicitly exclude.
      # Available rules: https://github.com/securego/gosec#available-rules
      excludes:
        - G109 # Potential Integer overflow made by strconv.Atoi result conversion to int16/32
        - G115 # Potential integer overflow when converting between integer types
        - G202 # SQL query construction using string concatenation
      # Filter out the issues with a lower severity than the given value.
      # Valid options are: low, medium, high.
      severity: medium
      # Filter out the issues with a lower confidence than the given value.
      # Valid options are: low, medium, high.
      confidence: medium
    govet:
      # Enable all analyzers.
      enable-all: true
      # Disable analyzers by name.
      # (in addition to default
      #   atomicalign, deepequalerrors, fieldalignment, findcall, nilness, reflectvaluecompare, shadow, sortslice,
      #   timeformat, unusedwrite
      # ).
      # Run `GL_DEBUG=govet golangci-lint run --enable=govet` to see default, all available analyzers, and enabled analyzers.
      disable:
        - fieldalignment
      # Settings per analyzer.
      settings:
        shadow:
          # Whether to be strict about shadowing; can be noisy.
          strict: false
    grouper:
      # Require the use of a single global 'const' declaration only.
      const-require-single-const: false
      # Require the use of grouped global 'const' declarations.
      const-require-grouping: false
      # Require the use of a single 'import' declaration only.
      import-require-single-import: true
      # Require the use of grouped 'import' declarations.
      import-require-grouping: false
      # Require the use of a single global 'type' declaration only.
      type-require-single-type: false
      # Require the use of grouped global 'type' declarations.
      type-require-grouping: false
      # Require the use of a single global 'var' declaration only.
      var-require-single-var: false
      # Require the use of grouped global 'var' declarations.
      var-require-grouping: false
    iface:
      # List of analyzers.
      enable:
        # Identifies interfaces in the same package that have identical method sets.
        - identical
        # Identifies interfaces that are not used anywhere in the same package where the interface is defined.
        - unused
        # Identifies functions that return interfaces, but the actual returned value is always a single concrete implementation.
        - opaque
        # Detects interfaces which are not exported but are used as parameters or return values in exported functions or methods.
        - unexported
      settings:
        # Analyzer name.
        unused:
          # List of packages path to exclude from the check.
          exclude: []
    inamedparam:
      # Skips check for interface methods with only a single parameter.
      skip-single-param: false
    interfacebloat:
      # The maximum number of methods allowed for an interface.
      max: 4
    ireturn:
      # List of interfaces to allow.
      # Lists of the keywords and regular expressions matched to interface or package names can be used.
      # `allow` and `reject` settings cannot be used at the same time.
      #
      # Keywords:
      # - `empty` for `interface{}`
      # - `error` for errors
      # - `stdlib` for standard library
      # - `anon` for anonymous interfaces
      # - `generic` for generic interfaces added in go 1.18
      allow:
        - anon
        - error
        - empty
        - stdlib
        - (or|er)$
    mnd:
      # List of enabled checks, see https://github.com/tommy-muehle/go-mnd/#checks for description.
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      # List of numbers to exclude from analysis.
      # The numbers should be written as string.
      # Values always ignored: "1", "1.0", "0" and "0.0"
      ignored-numbers:
        - "24" # always used as 24 * time.Hour.
      # List of function patterns to exclude from analysis.
      # Following functions are always ignored: `time.Date`,
      # `strconv.FormatInt`, `strconv.FormatUint`, `strconv.FormatFloat`,
      # `strconv.ParseInt`, `strconv.ParseUint`, `strconv.ParseFloat`.
      ignored-functions:
        - ^math\.
        - ^http\.StatusText$
        - ^strconv\.
        - ^time\.
        - ^make\.
    nestif:
      # Minimal complexity of if statements to report.
      min-complexity: 2
    nilnil:
      # To check functions with only two return values (`return nil, nil`).
      # If disabled then returns like `return nil, nil, ..., nil` are supported.
      only-two: true
      # In addition, detect opposite situation (simultaneous return of non-nil error and valid value).
      # E.g, `return clone, fh.indexer.Update(clone)` will be considered as invalid.
      detect-opposite: true
      checked-types:
        - chan
        - func
        - iface
        - map
        - ptr
        - uintptr
        - unsafeptr
    nlreturn:
      # Size of the block (including return statement that is still "OK")
      # so no return split required.
      block-size: 1
    nonamedreturns:
      # Report named error if it is assigned inside defer.
      report-error-in-defer: true
    perfsprint:
      # Optimizes even if it requires an int or uint type cast.
      int-conversion: true
      # Optimizes into `err.Error()` even if it is only equivalent for non-nil errors.
      err-error: true
      # Optimizes `fmt.Errorf`.
      errorf: false
      # Optimizes `fmt.Sprintf` with only one argument.
      sprintf1: false
      # Optimizes into strings concatenation.
      strconcat: false
      # Enable/disable optimization of concat loop.
      concat-loop: true
      # Optimization of `concat-loop` even with other operations.
      loop-other-ops: true
    prealloc:
      # IMPORTANT: we don't recommend using this linter before doing performance profiling.
      # For most programs usage of prealloc will be a premature optimization.
      # Report pre-allocation suggestions only on simple loops that have no returns/breaks/continues/gotos in them.
      simple: true
      # Report pre-allocation suggestions on range loops.
      range-loops: true
      # Report pre-allocation suggestions on for loops.
      for-loops: true
    recvcheck:
      # Disables the built-in method exclusions:
      # - `MarshalText`
      # - `MarshalJSON`
      # - `MarshalYAML`
      # - `MarshalXML`
      # - `MarshalBinary`
      # - `GobEncode`
      disable-builtin: true
    revive:
      # Maximum number of open files at the same time.
      # See https://github.com/mgechev/revive#command-line-flags
      max-open-files: 2048
      confidence: 0.5
      # Sets the default severity.
      # See https://github.com/mgechev/revive#configuration
      severity: warning
      enable-all-rules: true
      rules:
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#package-directory-mismatch
        - name: package-directory-mismatch
          severity: warning
          disabled: true
          exclude: [""]
          arguments:
            - ignore-directories: ["testcases", "testinfo"]
        - name: enforce-switch-style
          severity: warning
          disabled: false
          exclude: [""]
          arguments: ["allowNoDefault"]
        - name: filename-format
          arguments:
            - ^[_a-z][_a-z0-9]*\.go$
          severity: warning
          disabled: false
          exclude: []
        - name: file-length-limit
          arguments:
            - max: 500
              skipBlankLines: true
              skipComments: true
          severity: warning
          disabled: false
          exclude: []
        - name: redundant-build-tag
          severity: warning
          disabled: false
          exclude: []
        - name: use-errors-new
          disabled: true # the rule is contrary to out style.
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#add-constant
        - name: add-constant
          arguments:
            - allowFloats: 0.0,0.,1.0,1.,2.0,2.
              allowInts: 0,1,2
              allowStrs: '""'
              maxLitCount: "5"
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#argument-limit
        - name: argument-limit
          arguments:
            - 5
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#atomic
        - name: atomic
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#banned-characters
        - name: banned-characters
          arguments:
            - Ω
            - Σ
            - σ
            - "7"
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#bare-return
        - name: bare-return
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#blank-imports
        - name: blank-imports
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#bool-literal-in-expr
        - name: bool-literal-in-expr
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#call-to-gc
        - name: call-to-gc
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#cognitive-complexity
        - name: cognitive-complexity
          arguments:
            - 10
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#comment-spacings
        - name: comment-spacings
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#comments-density
        - name: comments-density
          arguments:
            - 15
          severity: warning
          disabled: true
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#confusing-naming
        - name: confusing-naming
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#confusing-results
        - name: confusing-results
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#constant-logical-expr
        - name: constant-logical-expr
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#context-as-argument
        - name: context-as-argument
          arguments:
            - allowTypesBefore: '*testing.T'
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#context-keys-type
        - name: context-keys-type
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#cyclomatic
        - name: cyclomatic
          arguments:
            - 10
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#datarace
        - name: datarace
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#deep-exit
        - name: deep-exit
          severity: warning
          disabled: true
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#defer
        - name: defer
          arguments:
            - - call-chain
              - loop
          severity: warning
          disabled: false
          exclude:
            - ""
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#dot-imports
        - name: dot-imports
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#duplicated-imports
        - name: duplicated-imports
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#early-return
        - name: early-return
          arguments:
            - preserveScope
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#empty-block
        - name: empty-block
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#empty-lines
        - name: empty-lines
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#enforce-map-style
        - name: enforce-map-style
          arguments:
            - make
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#enforce-repeated-arg-type-style
        - name: enforce-repeated-arg-type-style
          arguments:
            - any
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#enforce-slice-style
        - name: enforce-slice-style
          arguments:
            - make
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#error-naming
        - name: error-naming
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#error-return
        - name: error-return
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#error-strings
        - name: error-strings
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#errorf
        - name: errorf
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#exported
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#file-header
        - name: file-header
          disabled: true
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#flag-parameter
        - name: flag-parameter
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#function-length
        - name: function-length
          arguments:
            - 18
            - 100
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#function-result-limit
        - name: function-result-limit
          arguments:
            - 3
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#get-return
        - name: get-return
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#identical-branches
        - name: identical-branches
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#if-return
        - name: if-return
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#import-alias-naming
        - name: import-alias-naming
          arguments:
            - ^[a-z][a-z0-9]{0,}$
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#import-shadowing
        - name: import-shadowing
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#imports-blocklist
        - name: imports-blocklist
          arguments:
            - crypto/md5
            - crypto/sha1
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#increment-decrement
        - name: increment-decrement
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#indent-error-flow
        - name: indent-error-flow
          severity: warning
          disabled: false
          exclude: []
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#line-length-limit
        - name: line-length-limit
          arguments:
            - 125
          severity: warning
          disabled: false
          exclude: []
         # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#max-control-nesting
        - name: max-control-nesting
          arguments:
            - 3
